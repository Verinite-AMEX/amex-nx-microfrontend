server.port=8082
spring.application.name=wearables-backend

##################################################
# MYSQL
##################################################

spring.datasource.url=jdbc:mysql://localhost:3306/wearablesdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata

spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

##################################################
# JPA
##################################################

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false

# Optional
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

##################################################
# FLYWAY
##################################################

spring.flyway.enabled=true

spring.flyway.locations=classpath:db/migration

spring.flyway.baseline-on-migrate=true

spring.flyway.validate-on-migrate=true

logging.level.org.flywaydb=DEBUG

logging.level.org.springframework.jdbc=DEBUG

debug=true

logging.level.org.springframework.boot.autoconfigure=TRACE

##################################################
# EUREKA
##################################################

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.prefer-ip-address=true

##################################################
# ACTUATOR
##################################################

management.endpoints.web.exposure.include=health,info

management.endpoint.health.show-details=always

##################################################
# CORS
##################################################

app.cors.allowed-origins=http://localhost:4200,http://localhost:4206