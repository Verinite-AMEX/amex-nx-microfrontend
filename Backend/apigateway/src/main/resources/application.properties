spring.application.name=api-gateway
server.port=8080

# ?? Eureka ????????????????????????????????????????????????????????????????????
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=false

# ?? Load Balancer ?????????????????????????????????????????????????????????????
spring.cloud.loadbalancer.cache.enabled=false

# ?? JWT ???????????????????????????????????????????????????????????????????????
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# ?? Routes ???????????????????????????????????????????????????????????????????
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=wearables-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://wearables-backend
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/wearables/**

# ?? CORS (gateway level ? covers ALL routes including /api/auth/**) ???????????
# Add every port that any frontend runs on
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=\
  http://localhost:4200,\
  http://localhost:4201,\
  http://localhost:4202,\
  http://localhost:4203,\
  http://localhost:4204,\
  http://localhost:4205,\
  http://localhost:4206,\
  http://localhost:4207,\
  http://localhost:4208,\
  http://localhost:4209,\
  http://localhost:4210,\
  http://localhost:4211,\
  http://localhost:4212,\
  http://localhost:4213,\
  http://localhost:4216
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].maxAge=3600

# ?? Actuator ?????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
# Actuator CORS must match gateway CORS ? same origins
management.endpoints.web.cors.allowed-origins=\
  http://localhost:4200,\
  http://localhost:4201,\
  http://localhost:4202,\
  http://localhost:4203,\
  http://localhost:4204,\
  http://localhost:4205,\
  http://localhost:4206,\
  http://localhost:4207,\
  http://localhost:4208,\
  http://localhost:4209,\
  http://localhost:4210,\
  http://localhost:4211,\
  http://localhost:4212,\
  http://localhost:4213
management.endpoints.web.cors.allowed-methods=GET,POST,OPTIONS
management.endpoints.web.cors.allowed-headers=*
management.endpoints.web.cors.allow-credentials=true

# OnlineHelper Service
spring.cloud.gateway.server.webflux.routes[2].id=onlinehelper-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://onlinehelper
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/onlinehelper/**