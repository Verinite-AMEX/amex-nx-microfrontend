<div class="oms-change-password-page">

  <div class="oms-change-password-page__form">

    <h2 class="oms-change-password-page__title">{{ formTitle }}</h2>

    <amex-change-password-form

      [portalStyle]="portalStyle"

      [formTitle]="formTitle"

      [currentPasswordLabel]="currentPasswordLabel"

      [newPasswordLabel]="newPasswordLabel"

      [confirmPasswordLabel]="confirmPasswordLabel"

      [submitButtonLabel]="submitButtonLabel"

      [errorMessage]="errorMessage"

      [successMessage]="successMessage"

      [panelBackground]="panelBackground"

      [showHeader]="false">

    </amex-change-password-form>

  </div>

  <div class="oms-change-password-page__media" *ngIf="showMedia">

    <img
      *ngIf="mediaImageUrl"
      class="oms-change-password-page__media-img"
      [src]="mediaImageUrl"
      [alt]="mediaImageAlt">

    <div class="oms-change-password-page__media-placeholder" *ngIf="!mediaImageUrl">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
        <circle cx="9" cy="11" r="2"></circle>
        <path d="M21 16l-4.5-4.5a2 2 0 0 0-2.8 0L9 16"></path>
      </svg>
      <span>{{ mediaImageAlt }}</span>
    </div>

    <div class="oms-change-password-page__media-badge">
      <div class="oms-change-password-page__media-badge-brand">
        ONLINE<strong>Merchant<br>Services</strong>
      </div>
      <div class="oms-change-password-page__media-badge-caption">MANAGE YOUR ACCOUNT ONLINE</div>
    </div>

  </div>

</div>
