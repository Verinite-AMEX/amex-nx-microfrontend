<div class="tax-report-container">

  <div class="top-border"></div>

  <div class="content">

    <h2 class="title">
      Tax Invoice
    </h2>

    <ui-radio-group

      name="vatSearchType"

      orientation="horizontal"

      [options]="vatSearchTypeOptions"

      [(ngModel)]="vatSearchType">

    </ui-radio-group>

    <div class="form-grid">

      <div class="field">

        <ui-label>
          VAT Registration Number
        </ui-label>

        <ui-input
          type="text"
          [(ngModel)]="
            vatRegistrationNumber
          ">
        </ui-input>

        <small>
          There are no vat registration numbers.
        </small>

      </div>

      <div class="field">

        <ui-label>
          VAT Registered Country
        </ui-label>

        <ui-select
          [options]="countryOptions"
          placeholder="Select Country"
          [(ngModel)]="
            selectedCountry
          ">
        </ui-select>

      </div>

      <div class="field">

        <ui-label>
          From Date
        </ui-label>

        <ui-date-input
          [(ngModel)]="fromDate">
        </ui-date-input>

      </div>

      <div class="field">

        <ui-label>
          To Date
        </ui-label>

        <ui-date-input
          [(ngModel)]="toDate">
        </ui-date-input>

      </div>

    </div>

    <div class="bottom-radio">

      <ui-radio-group

        name="reportType"

        orientation="horizontal"

        [options]="reportTypeOptions"

        [(ngModel)]="reportType">

      </ui-radio-group>

    </div>

    <div class="button-group">

      <ui-button
        variant="secondary"
        [label]="'Back'"
        (click)="onBack()">
      </ui-button>

      <ui-button
        variant="primary"
        [label]="'Generate Report'"
        (click)="generateReport()">
      </ui-button>

    </div>

  </div>

</div>
