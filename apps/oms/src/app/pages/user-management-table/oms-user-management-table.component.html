<div

  tabindex="0"

  role="button"

  (click)="handleClick($event)"

  (keyup.enter)="handleClick($event)"

  (keydown.space)="handleClick($event)">

  <amex-user-management-table

    [rows]="
      showMerchantNumber
        ? paginatedRows
        : paginatedRowsWithoutMerchantNumber
    "

    [title]="title"

    [createLabel]="createLabel"

    [showDelete]="showDelete">

  </amex-user-management-table>

</div>

<oms-pagination

  [rows]="rows"

  [pageSize]="10"

  (pageData)="
    onPageChanged($event)
  ">

</oms-pagination>
