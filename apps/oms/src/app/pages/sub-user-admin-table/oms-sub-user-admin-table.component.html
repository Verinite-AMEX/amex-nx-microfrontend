<amex-sub-user-admin-table

  [rows]="paginatedRows"

  [title]="title"

  [showCreate]="showCreate"

  [createLabel]="createLabel"

  (createClick)="
    createUserClicked.emit()
  "

  (actionClick)="
    handleAction($event)
  ">

</amex-sub-user-admin-table>

<oms-pagination

  [rows]="rows"

  [pageSize]="10"

  (pageData)="
    onPageChanged($event)
  ">

</oms-pagination>
