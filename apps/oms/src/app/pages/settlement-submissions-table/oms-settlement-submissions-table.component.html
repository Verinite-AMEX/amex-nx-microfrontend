<h2 class="oms-settlement-page__title">MERCHANT DETAILS</h2>

<amex-merchant-details-panel

  [merchantAccounts]="merchantAccounts"

  [selectedAccountId]="selectedAccountId"

  (accountChange)="onAccountChange($event)"

  (submitted)="onMerchantDetailsSubmitted($event)">

</amex-merchant-details-panel>

<div *ngIf="loading" class="loading">

  Loading settlement data...

</div>

<amex-settlement-submissions-table

  *ngIf="!loading && hasSubmitted"

  [rows]="rows">

</amex-settlement-submissions-table>
