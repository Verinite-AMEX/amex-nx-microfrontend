<amex-customized-reports-form

  [reportTypes]="
    reportTypes
  "

  (submitClick)="
    onSubmit($event)
  "

  (backClick)="
    onBack()
  ">

</amex-customized-reports-form>

<div

  *ngIf="
    showSubscriptionWarning
  "

  class="warning-box">

  Warning:
  Use "Settlement Date"
  filter for Email Subscription reports.

</div>

<div class="search-container">

  <ui-input

    type="text"

    class="search-input"

    [(ngModel)]="
      searchKeyword
    "

    placeholder="
      Search Reports
    ">

  </ui-input>

  <ui-button

    variant="primary"

    [label]="'Search Reports'"

    (click)="
      onSearchReports()
    ">

  </ui-button>

</div>

<div
  class="reports-table-container">

  <h3 class="reports-title">

    Generated Reports

  </h3>

  <ui-table [bordered]="true">

    <ui-table-head>

      <ui-table-row [header]="true">

        <ui-table-header-cell>
          Report Type
        </ui-table-header-cell>

        <ui-table-header-cell>
          From Date
        </ui-table-header-cell>

        <ui-table-header-cell>
          To Date
        </ui-table-header-cell>

        <ui-table-header-cell>
          Status
        </ui-table-header-cell>

        <ui-table-header-cell>
          Generated Date
        </ui-table-header-cell>

      </ui-table-row>

    </ui-table-head>

    <ui-table-body>

      <ui-table-row

        *ngIf="
          paginatedReports.length === 0
        ">

        <ui-table-cell

          [colspan]="5"

          align="center"

          class="no-data">

          No Reports Generated Yet

        </ui-table-cell>

      </ui-table-row>

      <ui-table-row

        *ngFor="
          let report of paginatedReports
        ">

        <ui-table-cell>
          {{ report.reportType }}
        </ui-table-cell>

        <ui-table-cell>
          {{ report.fromDate }}
        </ui-table-cell>

        <ui-table-cell>
          {{ report.toDate }}
        </ui-table-cell>

        <ui-table-cell>

          <span class="status-badge">

            {{ report.status }}

          </span>

        </ui-table-cell>

        <ui-table-cell>
          {{ report.createdDate }}
        </ui-table-cell>

      </ui-table-row>

    </ui-table-body>

  </ui-table>

  <oms-pagination

  [rows]="generatedReports"

  [pageSize]="10"

  (pageData)="
    onPageChanged($event)
  ">

</oms-pagination>

</div>
