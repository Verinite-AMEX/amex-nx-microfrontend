<amex-page-component
  portalStyle="oms"
  portalTitle="Online Merchant Services"

  [tabs]="navItems"
  [activeTabId]="activeId"
  (tabClick)="onTabChanged($event)"

  [showSidebar]="showSidebar"
  [sidebarItems]="sidebarItems"
  [activeSidebarId]="activeSidebarId"
  (sidebarItemClick)="onMenuChanged($event)"

  (logout)="onLogout()">

  <div class="content">

    <oms-merchant-panel

      *ngIf="
        selectedSidebarMenu ===
        'merchantaccount'
      ">

    </oms-merchant-panel>

    <oms-merchant-data-form

      *ngIf="
        selectedSidebarMenu ===
        'editprofile'
      ">

    </oms-merchant-data-form>

    <oms-contact-information
      *ngIf="
        selectedSidebarMenu ===
        'contactinformation'
      ">
    </oms-contact-information>

    <oms-contact-information
      *ngIf="
        selectedSidebarMenu ===
        'marketinginformation'
      "

      sectionTitle="Marketing Information"
      >
    </oms-contact-information>

    <oms-contact-information
      *ngIf="
        selectedSidebarMenu ===
        'financeinformation'
      "

      sectionTitle="Finance Information"
      >
    </oms-contact-information>

    <oms-contact-information
      *ngIf="
        selectedSidebarMenu ===
        'operations'
      "

      sectionTitle="Operations"
      >
    </oms-contact-information>

    <oms-report-format
        *ngIf="
            selectedSidebarMenu ===
            'reportformat'
        ">
    </oms-report-format>

    <oms-vat-registration

    *ngIf="
        !showTaxInvoiceDelivery &&
        !showUploadCertificate &&
        !showTaxInvoiceReport &&
        selectedSidebarMenu === 'vatregistration'
    "

    (taxInvoiceDeliveryClicked)="
        onTaxInvoiceDeliveryClicked()
    "

    (uploadCertificateClicked)="
        onUploadCertificateClicked()
    "

    (downloadTaxInvoiceClicked)="
        onDownloadTaxInvoiceClicked()
    ">

    </oms-vat-registration>

    <oms-tax-invoice-delivery

    *ngIf="
        showTaxInvoiceDelivery &&
        selectedSidebarMenu === 'vatregistration'
    "

    [sectionTitle]="'Tax Invoice Delivery'"

    (backClicked)="
        onBackToVatRegistration()
    ">

    </oms-tax-invoice-delivery>

    <oms-upload-certificate

    *ngIf="
        showUploadCertificate &&
        selectedSidebarMenu === 'vatregistration'
    "
    (backClicked)="
        onBackToVatRegistrationFromUpload()
    ">
    </oms-upload-certificate>

    <oms-tax-invoice-report

    *ngIf="
        showTaxInvoiceReport
    "

    (backClicked)="
        onBackFromTaxInvoiceReport()
    ">

    </oms-tax-invoice-report>


</div>

<oms-terms-and-conditions

  *ngIf="showTermsConditions">

</oms-terms-and-conditions>

<oms-change-password

  *ngIf="showChangePassword">   
</oms-change-password>

<oms-customized-report

  *ngIf="showCustomizedReport">

</oms-customized-report>

<oms-settlement-submissions-table

  *ngIf="
    showSettlementSubmission
  ">

</oms-settlement-submissions-table>

<oms-sub-user-admin-table

  *ngIf="
    showSubUserAdmin &&
    !showCreateSubUser
  "

  [rows]="subUserRows"

  (createUserClicked)="
    onCreateSubUser()
  "

  (editUserClicked)="
    onEditSubUser($event)
  "

  (deleteUserClicked)="
    onDeleteSubUser($event)
  ">

</oms-sub-user-admin-table>

<oms-create-edit-user-form

  *ngIf="
    showCreateSubUser
  "

  [title]="'CREATE SUB USER'"

  [showMerchantAccess]="false"

  (saveClicked)="
    saveSubUser($event)
  ">

</oms-create-edit-user-form>

<oms-user-management-table

  *ngIf="
    showMrmUserAdmin &&
    !showCreateMrmUser
  "

  [title]="'MRM USER ADMINISTRATION'"

  [createLabel]="'Create MRM User'"

  [rows]="mrmUserRows"

  (createUserClicked)="
    onCreateMrmUser()
  "

  (editUserClicked)="
    onEditMrmUser($event)
  "

  (deleteUserClicked)="
    onDeleteMrmUser($event)
  ">

</oms-user-management-table>

<oms-create-edit-user-form

  *ngIf="
    showCreateMrmUser
  "

  [title]="'CREATE MRM USER'"

  [showMerchantAccess]="false"

  (saveClicked)="
    saveMrmUser($event)
  ">

</oms-create-edit-user-form>

<oms-user-management-table

  *ngIf="
    showOmsUsers &&
    !showCreateOmsUser
  "

  [title]="'OMS USER ADMINISTRATION'"

  [createLabel]="'Create OMS User'"

  [showMerchantNumber]="true"

  [rows]="omsUserRows"

  (createUserClicked)="
    onCreateOmsUser()
  "
  (editUserClicked)="
    onEditOmsUser($event)
  "
  (deleteUserClicked)="
    onDeleteOmsUser($event)
  ">

</oms-user-management-table>

<oms-create-edit-user-form

  *ngIf="
    showCreateOmsUser
  "

  [title]="'CREATE OMS USER'"

  (saveClicked)="
    saveOmsUser($event)
  ">

</oms-create-edit-user-form>

<div

  *ngIf="showEditUserPopup"

  class="popup-overlay">

  <div class="popup-content">

  <ui-icon-button

      icon="✕"

      ariaLabel="Close"

      variant="ghost"

      size="sm"

      (clicked)="closeEditPopup()">

    </ui-icon-button>

    <oms-edit-user-form

  *ngIf="
    editFormRender &&
    selectedEditUser
  "

  [attr.data-version]="
    editFormVersion
  "

  [title]="editPopupTitle"

  [showRole]="false"

  [data]="selectedEditUser"

  (updateUserClicked)="

    editPopupTitle ===
    'EDIT OMS USER'

      ? onUpdateOmsUser($event)

      : editPopupTitle ===
        'EDIT MRM USER'

          ? onUpdateMrmUser($event)

          : onUpdateSubUser($event)
  ">

</oms-edit-user-form>

  </div>

</div>

<oms-new-outlet-portal

  *ngIf="
    showNewOutletPortal &&
    !showNewOutletApplicationForm
  "

  (createApplicationClicked)="
    onCreateNewApplication()
  ">

</oms-new-outlet-portal>

<oms-new-outlet-application-form

  *ngIf="
    showNewOutletApplicationForm
  "

  (backClicked)="
    onBackToNewOutletPortal()
  ">

</oms-new-outlet-application-form>

</amex-page-component>
