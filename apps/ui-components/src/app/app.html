<!-- eslint-disable @angular-eslint/template/prefer-control-flow -->
<div class="shell">
  <aside class="sidebar" [class.collapsed]="!sidebarOpen">
    <div class="sidebar-header">
      <span class="sidebar-logo">⬡</span>
      <span class="sidebar-title" *ngIf="sidebarOpen">UI Components</span>
      <button
        class="sidebar-toggle"
        (click)="sidebarOpen = !sidebarOpen"
        aria-label="Toggle sidebar"
      >
        {{ sidebarOpen ? '◀' : '▶' }}
      </button>
    </div>

    <nav class="sidebar-nav">
      <div *ngFor="let group of nav" class="nav-group">
        <p class="nav-group-label" *ngIf="sidebarOpen">{{ group.group }}</p>
        <a
          *ngFor="let item of group.items"
          [routerLink]="item.path"
          routerLinkActive="active"
          class="nav-item"
          [title]="item.label"
        >
          <span class="nav-dot">•</span>
          <span class="nav-label" *ngIf="sidebarOpen">{{ item.label }}</span>
        </a>
      </div>
    </nav>
  </aside>

  <main class="main">
    <router-outlet></router-outlet>
  </main>
</div>
