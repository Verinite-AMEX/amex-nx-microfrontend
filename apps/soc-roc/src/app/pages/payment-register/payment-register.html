<div class="alg-container">

  <div class="alg-fieldset">
    <span class="alg-legend">View Report</span>

    <div class="alg-row">
      <label class="alg-label">Julian Day</label>
      <input type="text" class="alg-input" [(ngModel)]="julianDay" maxlength="3" />
    </div>

    <div class="alg-row">
      <label class="alg-label">Year</label>
      <select class="alg-select" [(ngModel)]="year">
        @for (y of yearList; track y) {
          <option [value]="y">{{ y }}</option>
        }
      </select>
    </div>

    <div class="alg-row">
      <label class="alg-label">Country</label>
      <select class="alg-select" [(ngModel)]="country">
        <option value="">-- Select --</option>
        @for (c of countryList; track c) {
          <option [value]="c">{{ c }}</option>
        }
      </select>
    </div>

    <div class="alg-row">
      <label class="alg-label">Currency</label>
      <select class="alg-select" [(ngModel)]="currency">
        <option value="">-- Select --</option>
        @for (c of currencyList; track c) {
          <option [value]="c">{{ c }}</option>
        }
      </select>
    </div>

    <div class="alg-row">
      <label class="alg-label">Reference Number</label>
      <input type="text" class="alg-input" [(ngModel)]="referenceNumber" />
    </div>

    @if (status === 'success') {
      <amex-success-toast [message]="statusMessage" [autoDismiss]="true" [duration]="4000"
        [dismissible]="true" (dismissed)="status = 'idle'">
      </amex-success-toast>
    }
    @if (status === 'error') {
      <amex-error-toast [message]="statusMessage" [dismissible]="true"
        (dismissed)="status = 'idle'">
      </amex-error-toast>
    }

    <div class="alg-btn-row">
      <button class="alg-btn alg-btn--action" (click)="onViewReport()" [disabled]="isLoading">
        {{ isLoading ? 'Loading...' : 'View Report' }}
      </button>
    </div>
  </div>

  @if (records.length > 0) {
    <amex-payment-register-table
      title="Payment Register"
      [rows]="records"
      (printClick)="onPrint()">
    </amex-payment-register-table>
  }

</div>
