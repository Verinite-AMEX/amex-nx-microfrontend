<div class="pr-container">

  <!-- Tab Buttons
  <div class="pr-tabs">
    <button class="pr-tab" (click)="onPaymentTab()">Payment</button>
    <button class="pr-tab pr-tab--active">View Report</button>
  </div> -->

  <!-- View Report Fieldset -->
  <div class="pr-fieldset">
    <span class="pr-legend">View Report</span>

    <div class="pr-row">
      <label class="pr-label">Julian Day</label>
      <input type="text" class="pr-input" [(ngModel)]="julianDay" maxlength="3" />
    </div>
    <div class="pr-row">
      <label class="pr-label">Year</label>
      <select class="pr-select" [(ngModel)]="year">
        <option *ngFor="let y of yearList" [value]="y">{{ y }}</option>
      </select>
    </div>
    <div class="pr-row">
      <label class="pr-label">Country</label>
      <select class="pr-select" [(ngModel)]="country">
        <option value="">-- Select --</option>
        <option *ngFor="let c of countryList" [value]="c">{{ c }}</option>
      </select>
    </div>
    <div class="pr-row">
      <label class="pr-label">Currency</label>
      <select class="pr-select" [(ngModel)]="currency">
        <option value="">-- Select --</option>
        <option *ngFor="let c of currencyList" [value]="c">{{ c }}</option>
      </select>
    </div>
    <div class="pr-row">
      <label class="pr-label">Reference Number</label>
      <input type="text" class="pr-input" [(ngModel)]="referenceNumber" />
    </div>

    <div *ngIf="statusMessage" class="pr-status" [class.pr-status--error]="status === 'error'">
      {{ statusMessage }}
    </div>

    <div class="pr-btn-row">
      <button class="pr-btn pr-btn--action" (click)="onViewReport()">View Report</button>
    </div>
  </div>

</div>
