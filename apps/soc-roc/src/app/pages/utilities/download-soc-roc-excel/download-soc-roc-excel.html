<div class="dse-wrapper">
  <div class="dse-row">
    <label class="dse-label" >S.E. No.</label>
    <input type="text" class="dse-input" [(ngModel)]="seNo" appNumbersOnly />
    <label class="dse-label">S.E. Name</label>
    <input type="text" class="dse-input" [(ngModel)]="seName" />
  </div>
  <div class="dse-row">
    <label class="dse-label">Date</label>
    <input type="text" class="dse-input" [(ngModel)]="date" appNumbersOnly/>
    <label class="dse-label">Country</label>
    <input type="text" class="dse-input" [(ngModel)]="country" />
    <label class="dse-label">Currency</label>
    <input type="text" class="dse-input" [(ngModel)]="currency" />
  </div>
  <div class="dse-row">
    <label class="dse-label">Grand Total</label>
    <input type="text" class="dse-input" [(ngModel)]="grandTotal" appNumbersOnly/>
    <label class="dse-label">Refund</label>
    <input type="checkbox" class="dse-checkbox" [(ngModel)]="refund" appNumbersOnly/>
  </div>
  <div class="dse-row">
    <label class="dse-label">No. of Charges</label>
    <input type="text" class="dse-input" [(ngModel)]="noOfCharges" appNumbersOnly/>
    <label class="dse-label">File Name</label>
    <label class="dse-choose-btn">
      Choose File
      <input type="file" accept=".xls,.xlsx" (change)="onFileSelected($event)" style="display:none" />
    </label>
    <span class="dse-file-label">{{ fileName || 'No file chosen' }}</span>
  </div>
  <div class="dse-row">
    <label class="dse-label">Soc. Ref. No.</label>
    <input type="text" class="dse-input" [(ngModel)]="socRefNo" appNumbersOnly/>
    <label class="dse-label">Sheet No.</label>
    <input type="text" class="dse-input dse-input-sm" [(ngModel)]="sheetNo" appNumbersOnly/>
  </div>
  @if (status === 'success') {
    <amex-success-toast [message]="statusMessage" [autoDismiss]="true" [duration]="4000"
      [dismissible]="true" (dismissed)="status = 'idle'">
    </amex-success-toast>
  }
  @if (status === 'error') {
    <amex-error-toast [message]="statusMessage" [dismissible]="true"
      (dismissed)="status = 'idle'">
    </amex-error-toast>
  }
  <div class="dse-btn-row">
    <button class="dse-btn" (click)="onRefreshData()" [disabled]="isRefreshing">
      {{ isRefreshing ? 'Refreshing...' : 'Refresh Data from XL' }}
    </button>
    <button class="dse-btn" (click)="onUploadToServer()" [disabled]="isUploading">
      {{ isUploading ? 'Uploading...' : 'Upload to Server' }}
    </button>
  </div>
</div>
