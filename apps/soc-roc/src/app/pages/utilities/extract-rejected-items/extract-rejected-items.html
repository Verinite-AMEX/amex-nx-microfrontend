<div class="ffu-container">

  <!-- Julian Day -->
  <div class="ffu-row">
    <label class="ffu-label">Enter the Julian Day <span class="ffu-required">*</span></label>
    <input type="text" class="ffu-text-input" [(ngModel)]="julianDay"
      appNumbersOnly
      (ngModelChange)="onJulianDayInput()" maxlength="3">
  </div>

  <!-- Today button -->
  <div class="ffu-row ffu-row-inline">
    <label class="ffu-label">or Select the capture date</label>
    <button class="ffu-today-btn" (click)="setToday()">Today</button>
  </div>

  <!-- Calendar -->
  <div class="ffu-calendar">
    <div class="ffu-cal-header">
      <button class="ffu-cal-nav" (click)="prevMonth()">&#9664;</button>
      <span class="ffu-cal-title">{{ calendarMonthYear }}</span>
      <button class="ffu-cal-nav" (click)="nextMonth()">&#9654;</button>
    </div>
    <div class="ffu-cal-grid">
      <div class="ffu-cal-day-name" *ngFor="let d of ['Su','Mo','Tu','We','Th','Fr','Sa']">{{ d }}</div>
      <div *ngFor="let day of calendarDays" class="ffu-cal-day"
        [class.ffu-cal-day--other]="!day.currentMonth"
        [class.ffu-cal-day--today]="isToday(day.date)"
        [class.ffu-cal-day--selected]="isSelected(day.date)"
        (click)="selectDate(day)">
        {{ day.date.getDate() }}
      </div>
    </div>
  </div>

  <!-- SE Number input -->
  <div class="ffu-row">
    <label class="ffu-label">SE Numbers <span class="ffu-required">*</span></label>
    <input type="text" class="ffu-text-input" [(ngModel)]="seNumber"
      appNumbersOnly
      placeholder="Enter SE Number">
  </div>

  <!-- SOC Header radio -->
  <div class="ffu-row" style="align-items:flex-start;">
    <label class="ffu-label"></label>
    <div>
      <div>
        <input type="radio" name="header" [value]="true" [(ngModel)]="includeSocHeader">
        With SOC header
      </div>
      <div style="margin-top:6px;">
        <input type="radio" name="header" [value]="false" [(ngModel)]="includeSocHeader">
        Without SOC header
      </div>
    </div>
  </div>

  <!-- vn-core Toast Messages -->
  @if (status === 'success') {
    <amex-success-toast
      [message]="statusMessage"
      [autoDismiss]="true"
      [duration]="4000"
      [dismissible]="true"
      (dismissed)="onDismissSuccess()">
    </amex-success-toast>
  }

  @if (status === 'error') {
    <amex-error-toast
      [message]="statusMessage"
      [dismissible]="true"
      (dismissed)="onDismissError()">
    </amex-error-toast>
  }

  <!-- Submit -->
  <div class="ffu-row">
    <button class="ffu-submit-btn" (click)="onExtractRejectedItems()" [disabled]="isLoading">
      {{ isLoading ? 'Processing...' : 'Do File Formation' }}
    </button>
  </div>

</div>
