<div class="ffu-container">
  <div class="ffu-row">
    <label class="ffu-label">File Name</label>
    <div class="dse-file-row">
      <label class="ffu-today-btn dse-choose-btn">
        Choose File
        <input type="file" accept=".xls,.xlsx" (change)="onFileSelected($event)" style="display:none" />
      </label>
      <span class="dse-file-label">{{ fileName || 'No file chosen' }}</span>
    </div>
  </div>
  <div class="ffu-row">
    <label class="ffu-label">Sheet No.</label>
    <input type="text" class="ffu-text-input dms-sheet-input" [(ngModel)]="sheetNo" appNumbersOnly/>
    <label class="ffu-label dms-refund-label">Refund</label>
    <input type="checkbox" [(ngModel)]="refund" />
  </div>
  @if (status === 'success') {
    <amex-success-toast
      [message]="statusMessage"
      [autoDismiss]="true"
      [duration]="4000"
      [dismissible]="true"
      (dismissed)="status = 'idle'">
    </amex-success-toast>
  }
  @if (status === 'error') {
    <amex-error-toast
      [message]="statusMessage"
      [dismissible]="true"
      (dismissed)="status = 'idle'">
    </amex-error-toast>
  }
  <div class="ffu-row dms-btn-row">
    <button class="ffu-submit-btn" (click)="onRefreshData()" [disabled]="isRefreshing">
      {{ isRefreshing ? 'Refreshing...' : 'Refresh Data from XL' }}
    </button>
    <button class="ffu-submit-btn" (click)="onUploadToServer()" [disabled]="isUploading">
      {{ isUploading ? 'Uploading...' : 'Upload to Server' }}
    </button>
  </div>
</div>
