<div class="rpt-container">

  <!-- Filters -->
  <div class="rpt-row">
    <label class="rpt-label">Julian Day <span class="rpt-required">*</span></label>
    <input type="text" class="rpt-input rpt-input--sm" [(ngModel)]="julianDay" maxlength="3" />
    <label class="rpt-label rpt-label--mid">Date</label>
    <input type="text" class="rpt-input rpt-input--date" [value]="selectedDate" readonly />
  </div>
  <div class="rpt-row">
    <label class="rpt-label">Sales Entity</label>
    <input type="text" class="rpt-input rpt-input--md" [(ngModel)]="salesEntity" maxlength="10" />
    <button class="rpt-btn rpt-btn--action" (click)="onSearch()">Search</button>
    <button class="rpt-btn" (click)="onClear()">Clear</button>
  </div>

  <div *ngIf="statusMessage" class="rpt-status" [class.rpt-status--error]="status === 'error'">
    {{ statusMessage }}
  </div>

  <!-- Results Table -->
  <div class="rpt-table-wrap" *ngIf="records.length > 0">
    <table class="rpt-table">
      <thead>
        <tr>
          <th>SOC Ref No.</th>
          <th>Sales Entity</th>
          <th>Card Number</th>
          <th>Amount</th>
          <th>Currency</th>
          <th>Rejection Reason</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of records; let i = index" [class.rpt-row-alt]="i % 2 !== 0">
          <td>{{ r.socRefNo }}</td>
          <td>{{ r.salesEntity }}</td>
          <td>{{ r.cardNumber }}</td>
          <td class="rpt-num">{{ r.amount | number:'1.2-2' }}</td>
          <td>{{ r.currency }}</td>
          <td>{{ r.rejectionReason }}</td>
          <td>
            <button class="rpt-btn rpt-btn--sm" (click)="onPrintLetter(r)">Print Letter</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="rpt-actions">
      <button class="rpt-btn rpt-btn--action" (click)="onPrintAll()">Print All</button>
      <button class="rpt-btn" (click)="onExport()">Export Document</button>
    </div>
  </div>

</div>
