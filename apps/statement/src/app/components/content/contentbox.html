<div class="statement-wrapper">
  <div class="statement-header">View Statements</div>
  <div class="statement-body">
    <div class="search-row">
      <span class="search-label"> Please enter a card number </span>
      <ui-input
        class="card-input"
        [type]="'text'"
        [placeholder]="'Enter card number'"
        (input)="onCardInput($event)"
      >
      </ui-input>
      <ui-button
        [label]="'View Statement'"
        [variant]="'primary'"
        [size]="'md'"
        (click)="onSubmit()"
      >
      </ui-button>
    </div>
    @if (errorMessage()) {
    <div class="error-text">{{ errorMessage() }}</div>
    } @if (showStatements()) {
    <div class="statement-table">
      <div class="table-row">
        <div class="left-col header-row">Latest Statement</div>
        <div class="right-col">{{ statementData()[0] }}</div>
      </div>
      @for ( item of statementData().slice(1); track item; let i = $index ) {
      <div class="table-row">
        <div class="left-col" [class.bold]="i === 0">
          {{ i === 0 ? 'Previous Statements' : '' }}
        </div>
        <div class="right-col">{{ item }}</div>
      </div>
      }
    </div>
    }
  </div>
</div>
