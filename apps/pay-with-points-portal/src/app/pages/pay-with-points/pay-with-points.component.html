<ng-container *ngIf="view === 'form'">
  <div class="pwp-page-header">Pay with Points - Agent Portal</div>

  <div class="pwp-form-section">
    <ui-form-field
      class="pwp-field"
      layout="horizontal"
      label="Enter Client Code"
      [required]="true"
      forId="client-code-input"
    >
      <div class="pwp-field-row">
        <ui-input
          id="client-code-input"
          class="pwp-input"
          type="text"
          [(ngModel)]="clientCode"
          placeholder="e.g. 20473521"
          [required]="true"
          (keydown.enter)="onSubmit()"
        >
        </ui-input>

        <ui-button
          class="pwp-submit-btn"
          variant="primary"
          type="button"
          label="SUBMIT"
          ariaLabel="Submit client code"
          (click)="onSubmit()"
        >
        </ui-button>
      </div>
    </ui-form-field>

    <div class="pwp-form-error" *ngIf="formError" role="alert" aria-live="assertive">
      {{ formError }}
    </div>
  </div>

  <div class="pwp-footer">Copyright © 2009 American Express Company</div>
</ng-container>

<ng-container *ngIf="view === 'select'">
  <div class="pwp-body">
    <amex-eligible-transactions-table
      pageTitle="SELECT & PAY WITH POINTS"
      [cards]="cardOptions"
      [eligibleRows]="eligibleRows"
      [historyRows]="historyRows"
      [pointsBalance]="pointsBalance?.toLocaleString() ?? ''"
      [aedValue]="aedEquivalent.toFixed(2)"
      [totalCredit]="totalCredit"
      [totalPointsRedeemed]="totalPointsRedeemed"
      [errorMessage]="errorMessage"
      (cardChange)="onCardSelected($event)"
      (redeemClick)="onRedeemClick($event)"
    >
    </amex-eligible-transactions-table>
  </div>

  <div class="pwp-footer">Copyright © 2009 American Express Company</div>
</ng-container>
