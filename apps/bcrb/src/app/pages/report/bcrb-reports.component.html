<!-- SHOW SIDEBAR -->

<amex-bcrb-reports-table
  *ngIf="currentView === 'reports'"
  [rows]="rows"
  [username]="username"
  (click)="handleClick($event)">
</amex-bcrb-reports-table>

<div *ngIf="currentView === 'sidebar'" class="layout">
  <div class="sidebar">
    <bcrb-sidebar (menuChanged)="onSidebarSelect($event)"></bcrb-sidebar>
  </div>

  <div class="content">
    <div *ngIf="!selectedMenu">
      Please select a report from left menu
    </div>
    <bcrb-report-download
      *ngIf="selectedMenu"
      [reportType]="selectedMenu"
      (submitRequest)="onSubmitRequest($event)">
    </bcrb-report-download>

  </div>

</div>
